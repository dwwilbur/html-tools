

<html>
<head>
  <title>Triangle Explorer</title>
  <meta name='viewport' content='initial-scale=1, maximum-scale=1, user-scalable=0, minimal-ui' />
  <style>
body, html
{
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}
canvas
{
  position:absolute;
}
textarea
{
  display: none;
  position:absolute;
  width: 700px;
  height: 60px;
  top: 370px;
  left: 24px;
  background: black;
  color: white;
  opacity: 0.7;
}
  </style>
</head>
<body bgcolor="white" onresize="sizeCanvas();" onload="load();">

<canvas id="canvas"></canvas>

<script type="text/javascript" >

var canvas = document.getElementById("canvas");
var mouseVertex = null;
var mouseCentroid = null;

canvas.onmousemove = function (e)
{
  if (!e) e = window.event;
  var canvasPosition = getMouseClientPosition(e);
  if (e.buttons === 1)
    mouseVertex = canvasPosition;
}

canvas.onmousedown = function(e)
{
  if (!e) e = window.event;
  canvasPosition = getMouseClientPosition(e);
  if(e.which == 1 || e.button == 1) // mouse left button
  {
    mouseVertex = canvasPosition;
  }
  else if(e.which == 3 || e.button == 2) // mouse right button
  {
    mouseCentroid = canvasPosition;
  }
};

canvas.addEventListener('contextmenu', function(e)
{
    if (!e) e = window.event;
    e.preventDefault(); // keep the right click from bringing up the context menu, instead we use it
    return false;
}, false);

function getMouseClientPosition(event)
{
  var position = { x: 0, y: 0 };
  if(event.x != undefined && event.y != undefined)
  {
    position.x = event.x;
    position.y = event.y;
  }
  else // firefox client x/y
  {
    position.x = event.clientX;
    position.y = event.clientY;
  }
  return position;
}

function draw()
{
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  var message = getHelpMessage();
  drawMessage(message, 24, 18);

  var cx = canvas.width / 2;
  var cy = canvas.height / 2;

  ctx.strokeStyle = "lightgray";
  ctx.fillStyle = "black";

  // center point
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
  ctx.fill();

  var vx;
  var vy;
  var r;
  if (mouseVertex != null)
  {
    ctx.fillStyle = "lightgray";

    // vertex point
    vx = mouseVertex.x;
    vy = mouseVertex.y;
    var rx = vx - cx;
    var ry = vy - cy;
    var r = Math.sqrt(rx*rx + ry*ry);
    ctx.beginPath();
    ctx.arc(vx, vy, 5, 0, 2 * Math.PI);
    ctx.fill();

    // circle
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.stroke();

    // vertical line
    ctx.beginPath();
    ctx.moveTo(cx, cy - r);
    ctx.lineTo(cx, cy + r);
    ctx.stroke();
  }

  var centx;
  var centy;
  if (mouseCentroid != null)
  {
    ctx.fillStyle = "black";
    // centroid point
    var centx = mouseCentroid.x;
    var centy = mouseCentroid.y;
    ctx.beginPath();
    ctx.arc(centx, centy, 5, 0, 2 * Math.PI);
    ctx.fill();
  }

  if (mouseVertex == null)
    return;
  if (mouseCentroid == null)
    return;

  ctx.strokeStyle = "lightgreen";

  // centroid to vertical line
  var dcx = centx - cx;
  var dcvx = vx - centx;
  var dcvy = centy - vy;
  var vcx = cx;
  var vcy = centy + dcvy * dcx / dcvx;
  ctx.beginPath();
  ctx.moveTo(vx, vy);
  ctx.lineTo(vcx, vcy);
  ctx.stroke();

  ctx.strokeStyle = "black";

  // triangle base
  var by = cy - vcy;
  var bw = Math.sqrt(r*r - by*by);
  var bx1 = cx - bw;
  var bx2 = cx + bw;
  ctx.beginPath();
  ctx.moveTo(bx1, vcy);
  ctx.lineTo(bx2, vcy);
  ctx.stroke();

  // other two triangle lines
  ctx.beginPath();
  ctx.moveTo(bx1, vcy);
  ctx.lineTo(vx, vy);
  ctx.lineTo(bx2, vcy);
  ctx.stroke();

  ctx.strokeStyle = "lightgreen";

  // other centroid lines
  var mx1 = (vx + bx2) / 2;
  var my1 = (vy + vcy) / 2;
  var mx2 = (vx + bx1) / 2;
  var my2 = (vy + vcy) / 2;
  ctx.beginPath();
  ctx.moveTo(bx1, vcy);
  ctx.lineTo(mx1, my1);
  ctx.moveTo(bx2, vcy);
  ctx.lineTo(mx2, my2);
  ctx.stroke();

  // vertical vertex line to match centroid
  var vvx = cx + (centx - cx) * 3;
  ctx.beginPath();
  ctx.moveTo(vvx, 0);
  ctx.lineTo(vvx, cy*2);
  ctx.stroke();
}

function drawMessage(message, x, y)
{
  drawText(message, x, y, "black");
}

function drawText(message, x, y, style)
{
  var messageLines = message.split("\n");
  for(var i = 0; i < messageLines.length; i++)
  {
    ctx.font = "14px Courier";
    ctx.fillStyle = style;
    ctx.fillText(messageLines[i], x, y + 20 * (i+1));
  }
}

function getHelpMessage()
{
  helpMessage = 
    " Left click = Specify vertex\n" +
    "Right click = Specify centroid";
  return helpMessage;
}

var timeoutID = undefined;

function loop(timeout)
{
  timeoutID = setTimeout(function() 
    {
      var maxTimeout = 120;
      var startTime = (new Date()).getTime();
      draw();
      var endTime = (new Date()).getTime();
      loop(maxTimeout - (endTime - startTime));
    }, timeout);
}

function load()
{
  sizeCanvas();
  window.scrollTo(0,1);
  window.onorientationchange = function() { window.scrollTo(0,1); sizeCanvas(); }
  loop(1);
}

function sizeCanvas()
{
  if(timeoutID)
  {
    clearTimeout(timeoutID);
  }

  // need to set a timeout so the browser can refresh or resize more before we reset everything which can take a slight delay
  timeoutID = setTimeout(function() 
    {
      var canvas = document.getElementById("canvas");
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";

      ctx = canvas.getContext("2d");
      loop(1);
    }, 60);
}

function fullScreen() 
{
  var el = document.body;
  // Supports most browsers and their versions.
  var requestMethod = el.requestFullScreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;

  if (requestMethod) 
  { // Native full screen.
      requestMethod.call(el);
  } 
  else if (typeof window.ActiveXObject !== "undefined") 
  { // Older IE.
      var wscript = new ActiveXObject("WScript.Shell");
      if (wscript !== null) {
          wscript.SendKeys("{F11}");
      }
  }
  return false;
}

</script>

</body>
</html>
